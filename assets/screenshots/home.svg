<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <style>
      .bg{fill:url(#g1)}
      .card{fill:#fff;stroke:#e6e9ef;stroke-width:2;rx:18;}
      .h1{font:700 36px sans-serif;fill:#0f172a}
      .muted{font:400 18px sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg" rx="24"/>
  <g transform="translate(60,60)">
    <rect width="1080" height="580" class="card"/>
    <text x="40" y="70" class="h1">Sak — Home</text>
    <text x="40" y="110" class="muted">Personalized plan, today’s workout, and quick stats</text>

    <rect x="40" y="140" width="320" height="220" fill="#f8fafc" rx="12" stroke="#e6e9ef"/>
    <text x="60" y="180" font-size="18" fill="#0f172a">Today</text>
    <text x="60" y="210" font-size="28" fill="#0f172a">Full Body Blast</text>

    <rect x="400" y="140" width="680" height="220" fill="#fbf7ff" rx="12" stroke="#eee"/>
    <text x="420" y="180" font-size="18" fill="#6b21a8">Progress</text>
    <rect x="420" y="200" width="560" height="22" fill="#e9d5ff" rx="11"/>
    <rect x="420" y="200" width="320" height="22" fill="#7c3aed" rx="11"/>
    <text x="420" y="240" font-size="16" fill="#374151">Streak: 12 days • Points: 2,340</text>

    <g transform="translate(40,390)">
      <text font-size="16" fill="#0f172a">Quick actions</text>
      <rect x="0" y="20" width="180" height="44" rx="10" fill="#0ea5e9"/>
      <text x="18" y="50" font-size="16" fill="#fff">Start Workout</text>
      <rect x="200" y="20" width="180" height="44" rx="10" fill="#34d399"/>
      <text x="218" y="50" font-size="16" fill="#fff">Log Meal</text>
    </g>
  </g>
</svg>
